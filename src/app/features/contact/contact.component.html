<section class="contact-section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info animate-fade-in">
        <h1 class="text-gradient" style="text-align: left;">Let’s <span style="color: white;">Connect</span></h1>
        <p>Have a project in mind? We’d love to hear from you. Reach out to us through any of the following channels.</p>
        
        <div class="contact-methods">
          <div class="method">
             <div class="service-icon-wrap" style="width: 60px; height: 60px; margin: 0;">
               <div class="icon-bg-glow"></div>
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
             </div>
             <div>
               <h4>Email</h4>
               <p><a href="mailto:thenovacapital@gmail.com">thenovacapital@gmail.com</a></p>
             </div>
          </div>
          <div class="method">
             <div class="service-icon-wrap" style="width: 60px; height: 60px; margin: 0;">
               <div class="icon-bg-glow"></div>
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
             </div>
             <div>
               <h4>Phone</h4>
               <p><a href="tel:+919930068177">+91 9930068177</a></p>
             </div>
          </div>
          <div class="method">
             <div class="service-icon-wrap" style="width: 60px; height: 60px; margin: 0;">
               <div class="icon-bg-glow"></div>
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
             </div>
             <div>
               <h4>Location</h4>
               <p>Mumbai, India</p>
             </div>
          </div>
        </div>
      </div>

      <div class="contact-form-container glass-card animate-fade-in">
        <form class="contact-form">
          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name" required name="name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Your Email" required email name="email">
          </div>
          <div class="form-group">
            <label>Interested In</label>
            <select name="service" required>
              <option value="" disabled selected>Select a Service</option>
              <option value="web-dev">Website Development</option>
              <option value="app-dev">App Development</option>
              <option value="software-dev">Software Development</option>
              <option value="graphic-design">Graphic Design</option>
              <option value="logo-design">Logo Design</option>
              <option value="branding">Branding</option>
              <option value="ads-design">Poster & Ads Design</option>
              <option value="uiux">UI/UX Design</option>
              <option value="digital-marketing">Digital Marketing</option>
              <option value="video-editing">Video Editing & Shoot</option>
            </select>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Tell us about your project" required name="message"></textarea>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>

<section class="final-cta-contact">
  <div class="container animate-fade-in">
    <div class="cta-box glass-card" style="background: linear-gradient(135deg, rgba(0, 162, 255, 0.1), rgba(112, 0, 255, 0.1)); text-align: center; padding: 60px;">
      <h2>Start your project with <span class="text-gradient">Nova Capital today.</span></h2>
    </div>
  </div>
</section>
