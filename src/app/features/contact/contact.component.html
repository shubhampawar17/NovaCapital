<section class="contact-section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info animate-fade-in">
        <h1 class="text-gradient" style="text-align: left;">Let's Ignite Your <span style="color: white;">Brand</span></h1>
        <p>Ready to take your business to the next level? Get in touch with us today for a free consultation.</p>
        
        <div class="contact-methods">
          <div class="method">
             <span>📍</span>
             <div>
               <h4>Visit Us</h4>
               <p>Mumbai, India</p>
             </div>
          </div>
          <div class="method">
             <span>📞</span>
             <div>
               <h4>Call Us</h4>
               <p>+91 9930068177</p>
             </div>
          </div>
          <div class="method">
             <span>✉️</span>
             <div>
               <h4>Email Us</h4>
               <p>hello@novacapital.com</p>
             </div>
          </div>
        </div>
      </div>

      <div class="contact-form-container glass-card animate-fade-in">
        <form class="contact-form">
          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Your Email">
          </div>
          <div class="form-group">
            <label>Service</label>
            <select>
              <option>App Development</option>
              <option>Website Development</option>
              <option>SEO Optimization</option>
              <option>Interior Design</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Tell us about your project"></textarea>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
